<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>AI Origins Network Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:-apple-system;background:#111;color:#fff;}
#map{height:100vh;}
.panel{
  position:absolute;top:20px;left:20px;
  background:rgba(0,0,0,0.6);
  padding:12px 16px;border-radius:10px;
}
.badge{padding:2px 6px;border-radius:6px;font-size:12px;}
.core{background:#2563eb;}
.edge{background:#16a34a;}
.offline{background:#dc2626;}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <strong>AI Origins Network</strong><br/>
  Nodes: <span id="count">0</span><br/>
  Updated: <span id="updated">-</span>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([30, 0], 2);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 5
}).addTo(map);

fetch('/network/data.json')
.then(r=>r.json())
.then(data=>{
  document.getElementById('count').textContent = data.nodes.length;
  document.getElementById('updated').textContent = data.updated_at;

  data.nodes.forEach(n=>{
    let color = n.status === "online" ? "#16a34a" : "#dc2626";

    const marker = L.circleMarker([n.lat, n.lng], {
      radius: 6,
      color: color
    }).addTo(map);

    marker.bindPopup(`
      <strong>${n.node_id}</strong><br/>
      ${n.city}, ${n.country}<br/>
      Role: ${n.role}<br/>
      Anchors: ${n.anchors}<br/>
      Governance: ${n.governance_actions}
    `);
  });
});
</script>

</body>
</html>
