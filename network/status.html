<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>AI Origins Node Status</title>
<style>
body{font-family:-apple-system;background:#fafafa;margin:0;}
header{padding:16px;background:#fff;border-bottom:1px solid #eee;}
table{width:100%;border-collapse:collapse;}
td,th{padding:10px;border-bottom:1px solid #eee;}
.online{color:#16a34a;}
.offline{color:#dc2626;}
</style>
</head>

<body>

<header>
  <strong>Node Status</strong>
</header>

<table>
<thead>
<tr>
<th>Node</th>
<th>Location</th>
<th>Status</th>
<th>Anchors</th>
<th>Last Seen</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<script>
fetch('/network/data.json')
.then(r=>r.json())
.then(data=>{
  const tbody = document.getElementById('rows');

  data.nodes.forEach(n=>{
    const tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${n.node_id}</td>
      <td>${n.city}</td>
      <td class="${n.status}">${n.status}</td>
      <td>${n.anchors}</td>
      <td>${n.last_seen}</td>
    `;

    tbody.appendChild(tr);
  });
});
</script>

</body>
</html>
